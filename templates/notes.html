{% extends 'base.html' %}
{% block title %}Notes{% endblock %}

{% block content %}
<h1 class="mb-4">My Notes</h1>
<ul class="list-group">
    {% for note in notes %}
    <li class="list-group-item d-flex justify-content-between align-items-center">
        {{ note.text }}
        <span>
            <a href="{{ url_for('edit_note', note_id=note.id) }}" class="btn btn-sm btn-outline-primary">Edit</a>
            <a href="{{ url_for('delete_note', note_id=note.id) }}" class="btn btn-sm btn-outline-danger">Delete</a>
        </span>
    </li>
    {% endfor %}
</ul>
<a href="{{ url_for('add_note') }}" class="btn btn-success mt-3">Add New Note</a>
{% endblock %}
