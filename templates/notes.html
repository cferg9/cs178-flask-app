<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Notes</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h1>Notes 📝</h1>
    <a href="{{ url_for('home') }}" class="btn btn-secondary mb-3">Home</a>
    <a href="{{ url_for('add_note') }}" class="btn btn-primary mb-3">Add Note</a>
    <table class="table table-striped">
        <thead>
            <tr>
                <th>ID</th>
                <th>Country Code</th>
                <th>Note</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
        {% for row in rows %}
            <tr>
                <td>{{ row.id }}</td>
                <td>{{ row.country_code }}</td>
                <td>{{ row.note }}</td>
                <td>
                    <a href="{{ url_for('update_note', id=row.id) }}" class="btn btn-info btn-sm">Edit</a>
                    <a href="{{ url_for('delete_note', id=row.id) }}" class="btn btn-danger btn-sm">Delete</a>
                </td>
            </tr>
        {% endfor %}
        </tbody>
    </table>
</div>
</body>
</html>
