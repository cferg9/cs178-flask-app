<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Favorites</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h1>Favorites ⭐</h1>
    <a href="{{ url_for('home') }}" class="btn btn-secondary mb-3">Home</a>
    <table class="table table-striped">
        <thead>
            <tr>
                <th>Country Code</th>
            </tr>
        </thead>
        <tbody>
        {% for fav in favs %}
            <tr>
                <td>{{ fav['country_code'] }}</td>
            </tr>
        {% endfor %}
        </tbody>
    </table>
</div>
</body>
</html>
